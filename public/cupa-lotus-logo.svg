<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="#100d07"/>
  <!-- Lotus petals (4-fold symmetry, 8 petals) -->
  <g transform="translate(50,50)">
    <ellipse rx="5" ry="18" fill="none" stroke="#d9a544" stroke-width="1.8" opacity="0.85"/>
    <ellipse rx="5" ry="18" transform="rotate(45)"  fill="none" stroke="#d9a544" stroke-width="1.8" opacity="0.85"/>
    <ellipse rx="5" ry="18" transform="rotate(90)"  fill="none" stroke="#d9a544" stroke-width="1.8" opacity="0.85"/>
    <ellipse rx="5" ry="18" transform="rotate(135)" fill="none" stroke="#d9a544" stroke-width="1.8" opacity="0.85"/>
    <!-- Inner ring -->
    <circle r="11" fill="none" stroke="#d9a544" stroke-width="2"/>
    <!-- Center dot -->
    <circle r="4.5" fill="#d9a544"/>
  </g>
</svg>
